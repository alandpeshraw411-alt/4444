<!DOCTYPE html>
<html>
<head>
  <title>NovaTech AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    /* Navbar */
    .navbar {
      background: black;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .navbar a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    /* Videos */
    .videos {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 40px;
    }

    iframe {
      width: 300px;
      height: 180px;
      border-radius: 10px;
    }

    /* Chat button */
    .chat-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #00c6ff;
      color: black;
      padding: 15px;
      border-radius: 50%;
      cursor: pointer;
    }

    /* Chat box */
    .chat-box {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 300px;
      background: white;
      color: black;
      border-radius: 10px;
      display: none;
      flex-direction: column;
    }

    .chat-header {
      background: #0072ff;
      color: white;
      padding: 10px;
    }

    .chat-messages {
      height: 200px;
      overflow-y: auto;
      padding: 10px;
    }

    .chat-input {
      display: flex;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
    }

    .chat-input button {
      padding: 10px;
      border: none;
      background: #0072ff;
      color: white;
    }

    .footer {
      text-align: center;
      padding: 20px;
      background: black;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div><b>NovaTech AI</b></div>
    <div>
      <a href="#">Home</a>
      <a href="#">AI Videos</a>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <h1>Welcome to NovaTech AI</h1>
    <p>Explore AI and chat with our assistant</p>
  </div>

  <!-- Videos -->
  <div class="videos">
    <iframe src="https://www.youtube.com/embed/2ePf9rue1Ao" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/JMUxmLyrhSk" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/ad79nYk2keg" allowfullscreen></iframe>
  </div>

  <!-- Chat Button -->
  <div class="chat-btn" onclick="toggleChat()">💬</div>

  <!-- Chat Box -->
  <div class="chat-box" id="chatBox">
    <div class="chat-header">NovaTech AI</div>
    <div class="chat-messages" id="messages"></div>

    <div class="chat-input">
      <input id="userInput" placeholder="Ask something...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>© 2026 NovaTech AI</p>
  </div>

  <script>
    function toggleChat() {
      let box = document.getElementById("chatBox");
      box.style.display = box.style.display === "flex" ? "none" : "flex";
    }

    function sendMessage() {
      let input = document.getElementById("userInput");
      let messages = document.getElementById("messages");

      let userText = input.value;
      if (userText === "") return;

      messages.innerHTML += "<p><b>You:</b> " + userText + "</p>";

      let reply = getAIResponse(userText);
      messages.innerHTML += "<p><b>AI:</b> " + reply + "</p>";

      input.value = "";
      messages.scrollTop = messages.scrollHeight;
    }

    function getAIResponse(input) {
      input = input.toLowerCase();

      if (input.includes("hello")) return "Hello! 👋 How can I help you?";
      if (input.includes("ai")) return "AI is the future of technology.";
      if (input.includes("website")) return "We build modern websites.";
      if (input.includes("price")) return "Contact us for pricing.";
      if (input.includes("name")) return "I am NovaTech AI 🤖";
      if (input.includes("who are you")) return "I am your AI assistant.";
      if (input.includes("help")) return "Ask me about AI or websites.";

      return "I'm still learning, try asking something else!";
    }
  </script>

</body>
</html>
