<!DOCTYPE html><html>
<head>
  <title>8 Ball Pool</title>
  <style>
    body {
      text-align: center;
      background: #0b1a2a;
      color: white;
      font-family: Arial;
    }
    canvas {
      background: #0f7a2a;
      border: 6px solid #3b2f2f;
      margin-top: 20px;
      touch-action: none;
    }
  </style>
</head>
<body><h2>🎱 8 Ball Pool (Mobile + Cue + Power)</h2>
<p id="turn">Player 1 Turn</p><canvas id="game" width="700" height="350"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let balls = [];
let radius = 8;

let playerTurn = 1;
let gameOver = false;

let aiming = false;
let power = 0;
let angle = 0;

// Cue ball
balls.push({x:150, y:175, vx:0, vy:0, color:"white", type:"cue"});

// Rack
let colors = ["yellow","blue","red","purple","orange","green","brown"];
let xStart = 500;
let yStart = 175;
let index = 0;

for(let row=0; row<5; row++){
  for(let col=0; col<=row; col++){
    balls.push({
      x: xStart + row*18,
      y: yStart - row*9 + col*18,
      vx:0, vy:0,
      color: (row===2 && col===1) ? "black" : colors[index++ % colors.length],
      type: (index % 2 === 0) ? "solid" : "stripe"
    });
  }
}

// pockets
let pockets = [
  {x:0,y:0},{x:350,y:0},{x:700,y:0},
  {x:0,y:350},{x:350,y:350},{x:700,y:350}
];

// -------- INPUT (MOUSE + TOUCH) --------
function getPos(e){
  if(e.touches){
    return {
      x: e.touches[0].clientX - canvas.getBoundingClientRect().left,
      y: e.touches[0].clientY - canvas.getBoundingClientRect().top
    };
  } else {
    return { x: e.offsetX, y: e.offsetY };
  }
}

canvas.addEventListener("mousedown", startAim);
canvas.addEventListener("touchstart", startAim);

function startAim(e){
  if(gameOver) return;
  aiming = true;
}

canvas.addEventListener("mousemove", aimMove);
canvas.addEventListener("touchmove", aimMove);

function aimMove(e){
  if(!aiming) return;

  let pos = getPos(e);
  let cue = balls.find(b=>b.type==="cue");

  let dx = cue.x - pos.x;
  let dy = cue.y - pos.y;

  angle = Math.atan2(dy, dx);
  power = Math.min(Math.sqrt(dx*dx + dy*dy), 120);
}

canvas.addEventListener("mouseup", shoot);
canvas.addEventListener("touchend", shoot);

function shoot(){
  if(gameOver) return;

  aiming = false;

  let cue = balls.find(b=>b.type==="cue");

  cue.vx = Math.cos(angle) * power * 0.25;
  cue.vy = Math.sin(angle) * power * 0.25;

  power = 0;
}

// -------- DRAW --------
function drawBall(b){
  ctx.beginPath();
  ctx.arc(b.x, b.y, radius, 0, Math.PI*2);
  ctx.fillStyle = b.color;
  ctx.fill();
}

function drawPockets(){
  ctx.fillStyle="black";
  pockets.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,14,0,Math.PI*2);
    ctx.fill();
  });
}

function drawCue(){
  if(aiming){
    let cue = balls.find(b=>b.type==="cue");

    let cueX = cue.x + Math.cos(angle) * (power + 25);
    let cueY = cue.y + Math.sin(angle) * (power + 25);

    ctx.beginPath();
    ctx.moveTo(cueX, cueY);
    ctx.lineTo(cue.x, cue.y);
    ctx.strokeStyle = "#deb887";
    ctx.lineWidth = 5;
    ctx.stroke();
  }
}

// -------- COLLISION --------
function collide(b1,b2){
  let dx = b2.x - b1.x;
  let dy = b2.y - b1.y;
  let dist = Math.sqrt(dx*dx+dy*dy);

  if(dist < radius*2){
    let angle = Math.atan2(dy,dx);
    let speed1 = Math.sqrt(b1.vx*b1.vx + b1.vy*b1.vy);
    let speed2 = Math.sqrt(b2.vx*b2.vx + b2.vy*b2.vy);

    b1.vx = speed2 * Math.cos(angle);
    b1.vy = speed2 * Math.sin(angle);

    b2.vx = speed1 * Math.cos(angle+Math.PI);
    b2.vy = speed1 * Math.sin(angle+Math.PI);
  }
}

// -------- UPDATE --------
function update(){
  let moving = false;

  balls.forEach(b=>{
    b.x += b.vx;
    b.y += b.vy;

    b.vx *= 0.98;
    b.vy *= 0.98;

    if(Math.abs(b.vx)>0.1 || Math.abs(b.vy)>0.1){
      moving = true;
    }

    if(b.x<radius || b.x>canvas.width-radius) b.vx*=-1;
    if(b.y<radius || b.y>canvas.height-radius) b.vy*=-1;
  });

  // collisions
  for(let i=0;i<balls.length;i++){
    for(let j=i+1;j<balls.length;j++){
      collide(balls[i],balls[j]);
    }
  }

  // pockets
  balls = balls.filter(b=>{
    for(let p of pockets){
      let dx = b.x - p.x;
      let dy = b.y - p.y;
      if(Math.sqrt(dx*dx+dy*dy) < 14){
        if(b.color==="black"){
          document.getElementById("turn").innerText =
            "Player " + playerTurn + " loses! 8-ball pocketed!";
          gameOver = true;
        }
        if(b.type==="cue"){
          b.x = 150; b.y = 175;
          b.vx = b.vy = 0;
          return true;
        }
        return false;
      }
    }
    return true;
  });

  // switch turn
  if(!moving && !aiming && !gameOver){
    playerTurn = playerTurn === 1 ? 2 : 1;
    document.getElementById("turn").innerText =
      "Player " + playerTurn + " Turn";
  }
}

// -------- LOOP --------
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawPockets();
  balls.forEach(drawBall);
  drawCue();
  update();
  requestAnimationFrame(loop);
}

loop();
</script></body>
</html>
