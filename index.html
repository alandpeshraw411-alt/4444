<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8 Ball Pool FINAL</title>
<style>
body {
  margin:0;
  background:#0b3d2e;
  font-family:sans-serif;
  text-align:center;
  color:white;
}
#ui {
  padding:10px;
}
button {
  padding:10px 20px;
  margin:5px;
  font-size:16px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
canvas {
  display:block;
  margin:auto;
  background:#1e7a5b;
  border:10px solid #5b3a1e;
  border-radius:10px;
}
</style>
</head>
<body>

<div id="ui">
  <div id="turn"></div>
  <div id="score"></div>
  <div id="info"></div>
  <button onclick="restart()">Restart</button>
</div>

<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const R=10, FRICTION=0.985;

let balls=[], cueBall;
let dragging=false, aimX=0, aimY=0, power=0;
let currentPlayer=1;
let scores={1:0,2:0};
let shotInProgress=false;
let gameOver=false;

const turnText=document.getElementById("turn");
const scoreText=document.getElementById("score");
const infoText=document.getElementById("info");

const pockets=[
  {x:0,y:0},{x:450,y:0},{x:900,y:0},
  {x:0,y:450},{x:450,y:450},{x:900,y:450}
];

function restart(){
  init();
  scores={1:0,2:0};
  currentPlayer=1;
  gameOver=false;
  updateUI();
}

function init(){
  balls=[];
  cueBall={x:200,y:225,vx:0,vy:0,color:"white",alive:true};
  balls.push(cueBall);

  let sx=600, sy=225;
  for(let r=0;r<5;r++){
    for(let i=0;i<=r;i++){
      balls.push({
        x:sx+r*22,
        y:sy-r*11+i*22,
        vx:0,vy:0,
        color:(i%2===0?"orange":"blue"),
        alive:true
      });
    }
  }
}

init();

function getPos(e){
  if(e.touches) return {
    x:e.touches[0].clientX-canvas.offsetLeft,
    y:e.touches[0].clientY-canvas.offsetTop
  };
  return {x:e.offsetX,y:e.offsetY};
}

canvas.addEventListener("mousedown", start);
canvas.addEventListener("touchstart", start);

function start(e){
  if(!allStopped()||gameOver) return;
  let pos=getPos(e);
  dragging=true;
  aimX=pos.x;
  aimY=pos.y;
}

canvas.addEventListener("mousemove", move);
canvas.addEventListener("touchmove", move);

function move(e){
  if(dragging){
    let pos=getPos(e);
    aimX=pos.x;
    aimY=pos.y;
    let dx=cueBall.x-aimX;
    let dy=cueBall.y-aimY;
    power=Math.min(Math.hypot(dx,dy),130);
  }
}

canvas.addEventListener("mouseup", shoot);
canvas.addEventListener("touchend", shoot);

function shoot(){
  if(dragging){
    let dx=cueBall.x-aimX;
    let dy=cueBall.y-aimY;
    let ang=Math.atan2(dy,dx);

    cueBall.vx=Math.cos(ang)*power*0.22;
    cueBall.vy=Math.sin(ang)*power*0.22;

    dragging=false;
    power=0;
    shotInProgress=true;
  }
}

function allStopped(){
  return balls.every(b=>Math.abs(b.vx)<0.1&&Math.abs(b.vy)<0.1);
}

function collide(b1,b2){
  let dx=b2.x-b1.x, dy=b2.y-b1.y;
  let dist=Math.hypot(dx,dy);
  if(dist===0) return;

  let nx=dx/dist, ny=dy/dist;
  let p=2*(b1.vx*nx+b1.vy*ny - b2.vx*nx - b2.vy*ny)/2;

  b1.vx-=p*nx;
  b1.vy-=p*ny;
  b2.vx+=p*nx;
  b2.vy+=p*ny;
}

function update(){
  balls.forEach(b=>{
    if(!b.alive) return;

    b.x+=b.vx;
    b.y+=b.vy;
    b.vx*=FRICTION;
    b.vy*=FRICTION;

    if(b.x<R||b.x>canvas.width-R) b.vx*=-1;
    if(b.y<R||b.y>canvas.height-R) b.vy*=-1;

    pockets.forEach(p=>{
      if(Math.hypot(b.x-p.x,b.y-p.y)<20){
        if(b===cueBall){
          infoText.innerText="Foul!";
          currentPlayer=currentPlayer===1?2:1;
          b.x=200; b.y=225;
          b.vx=b.vy=0;
        } else {
          b.alive=false;
          scores[currentPlayer]++;
          if(scores[currentPlayer]>=7){
            gameOver=true;
            infoText.innerText="Player "+currentPlayer+" Wins!";
          }
        }
      }
    });
  });

  for(let i=0;i<balls.length;i++){
    for(let j=i+1;j<balls.length;j++){
      let b1=balls[i], b2=balls[j];
      if(!b1.alive||!b2.alive) continue;
      if(Math.hypot(b1.x-b2.x,b1.y-b2.y)<2*R){
        collide(b1,b2);
      }
    }
  }

  if(shotInProgress && allStopped()){
    currentPlayer=currentPlayer===1?2:1;
    shotInProgress=false;
  }

  updateUI();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="black";
  pockets.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,20,0,Math.PI*2);
    ctx.fill();
  });

  balls.forEach(b=>{
    if(!b.alive) return;

    ctx.fillStyle="rgba(0,0,0,0.3)";
    ctx.beginPath();
    ctx.arc(b.x+3,b.y+3,R,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle=b.color;
    ctx.beginPath();
    ctx.arc(b.x,b.y,R,0,Math.PI*2);
    ctx.fill();
  });

  if(dragging){
    let dx=cueBall.x-aimX;
    let dy=cueBall.y-aimY;
    let ang=Math.atan2(dy,dx);

    ctx.strokeStyle="white";
    ctx.beginPath();
    ctx.moveTo(cueBall.x,cueBall.y);
    ctx.lineTo(
      cueBall.x+Math.cos(ang)*400,
      cueBall.y+Math.sin(ang)*400
    );
    ctx.stroke();
  }
}

function updateUI(){
  turnText.innerText="Turn: Player "+currentPlayer;
  scoreText.innerText=`P1: ${scores[1]} | P2: ${scores[2]}`;
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
updateUI();
</script>
</body>
</html>
