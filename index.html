<!DOCTYPE html>
<html>
<head>
  <title>NovaTech</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    /* Navbar */
    .navbar {
      background: black;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .navbar a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(to right, #007BFF, #00C6FF);
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      margin-bottom: 10px;
    }

    .hero button {
      padding: 10px 20px;
      border: none;
      background: white;
      color: #007BFF;
      border-radius: 5px;
      cursor: pointer;
    }

    /* Services */
    .services {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      width: 200px;
      text-align: center;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      background: black;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div><b>NovaTech</b></div>
    <div>
      <a href="#">Home</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </div>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <h1>Welcome to NovaTech</h1>
    <p>We create modern, fast, and beautiful websites</p>
    <button>Get Started</button>
  </div>

  <!-- Services -->
  <div class="services">
    <div class="card">
      <h3>Web Design</h3>
      <p>Clean and modern UI design</p>
    </div>

    <div class="card">
      <h3>Development</h3>
      <p>Fast and secure websites</p>
    </div>

    <div class="card">
      <h3>Support</h3>
      <p>24/7 customer help</p>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>© 2026 NovaTech. All rights reserved.</p>
  </div>

</body>
</html>
