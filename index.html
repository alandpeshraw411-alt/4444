<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8 Ball Pool Advanced</title>
<style>
body {
  margin:0;
  background:#0b3d2e;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
canvas {
  background:#1e7a5b;
  border:10px solid #5b3a1e;
  border-radius:10px;
}
</style>
</head>
<body>
<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const RADIUS = 10;
const FRICTION = 0.985;

let balls = [];
let cueBall;
let dragging = false;
let aimX=0, aimY=0, power=0;

// spin
let spinX = 0;
let spinY = 0;

// pockets
const pockets = [
  {x:0,y:0},{x:450,y:0},{x:900,y:0},
  {x:0,y:450},{x:450,y:450},{x:900,y:450}
];

function init(){
  balls=[];
  cueBall={x:200,y:225,vx:0,vy:0,spinX:0,spinY:0,color:"white",alive:true};
  balls.push(cueBall);

  let startX=600, startY=225;
  for(let row=0; row<5; row++){
    for(let i=0;i<=row;i++){
      balls.push({
        x:startX+row*22,
        y:startY-row*11+i*22,
        vx:0,vy:0,
        spinX:0,spinY:0,
        color:"orange",
        alive:true
      });
    }
  }
}
init();

// mouse
canvas.addEventListener("mousedown", e=>{
  if(!allStopped()) return;

  let dx = e.offsetX - cueBall.x;
  let dy = e.offsetY - cueBall.y;

  // click on ball = set spin
  if(Math.sqrt(dx*dx+dy*dy) < 20){
    spinX = dx * 0.05;
    spinY = dy * 0.05;
    return;
  }

  dragging=true;
  aimX=e.offsetX;
  aimY=e.offsetY;
});

canvas.addEventListener("mousemove", e=>{
  if(dragging){
    aimX=e.offsetX;
    aimY=e.offsetY;
    let dx=cueBall.x-aimX;
    let dy=cueBall.y-aimY;
    power=Math.min(Math.sqrt(dx*dx+dy*dy),120);
  }
});

canvas.addEventListener("mouseup", e=>{
  if(dragging){
    let dx=cueBall.x-aimX;
    let dy=cueBall.y-aimY;
    let angle=Math.atan2(dy,dx);

    cueBall.vx=Math.cos(angle)*power*0.2;
    cueBall.vy=Math.sin(angle)*power*0.2;

    cueBall.spinX = spinX;
    cueBall.spinY = spinY;

    spinX=0;
    spinY=0;

    dragging=false;
    power=0;
  }
});

function allStopped(){
  return balls.every(b=>Math.abs(b.vx)<0.1 && Math.abs(b.vy)<0.1);
}

// physics
function resolveCollision(b1,b2){
  const dx=b2.x-b1.x;
  const dy=b2.y-b1.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist===0) return;

  const nx=dx/dist;
  const ny=dy/dist;

  const p = 2*(b1.vx*nx+b1.vy*ny - b2.vx*nx - b2.vy*ny)/2;

  b1.vx -= p*nx;
  b1.vy -= p*ny;
  b2.vx += p*nx;
  b2.vy += p*ny;
}

function update(){
  balls.forEach(b=>{
    if(!b.alive) return;

    b.x+=b.vx;
    b.y+=b.vy;

    // spin effect
    b.vx += b.spinX * 0.01;
    b.vy += b.spinY * 0.01;

    b.spinX *= 0.98;
    b.spinY *= 0.98;

    b.vx*=FRICTION;
    b.vy*=FRICTION;

    // cushions
    if(b.x<RADIUS || b.x>canvas.width-RADIUS){
      b.vx*=-1;
      b.spinX*=-0.5;
    }
    if(b.y<RADIUS || b.y>canvas.height-RADIUS){
      b.vy*=-1;
      b.spinY*=-0.5;
    }

    // pockets
    pockets.forEach(p=>{
      let dx=b.x-p.x, dy=b.y-p.y;
      if(Math.sqrt(dx*dx+dy*dy)<20){
        if(b===cueBall){
          b.x=200; b.y=225;
          b.vx=b.vy=0;
        } else {
          b.alive=false;
        }
      }
    });
  });

  // collisions
  for(let i=0;i<balls.length;i++){
    for(let j=i+1;j<balls.length;j++){
      let b1=balls[i], b2=balls[j];
      if(!b1.alive||!b2.alive) continue;

      let dx=b2.x-b1.x;
      let dy=b2.y-b1.y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<2*RADIUS){
        resolveCollision(b1,b2);
      }
    }
  }
}

// draw
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // pockets
  ctx.fillStyle="black";
  pockets.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,20,0,Math.PI*2);
    ctx.fill();
  });

  // balls
  balls.forEach(b=>{
    if(!b.alive) return;
    ctx.fillStyle=b.color;
    ctx.beginPath();
    ctx.arc(b.x,b.y,RADIUS,0,Math.PI*2);
    ctx.fill();
  });

  // spin indicator
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(cueBall.x + spinX*10, cueBall.y + spinY*10, 3, 0, Math.PI*2);
  ctx.fill();

  // aim + cue
  if(dragging){
    let dx=cueBall.x-aimX;
    let dy=cueBall.y-aimY;
    let angle=Math.atan2(dy,dx);

    // aim line
    ctx.strokeStyle="rgba(255,255,255,0.5)";
    ctx.beginPath();
    ctx.moveTo(cueBall.x,cueBall.y);
    ctx.lineTo(
      cueBall.x+Math.cos(angle)*300,
      cueBall.y+Math.sin(angle)*300
    );
    ctx.stroke();

    // cue stick
    ctx.strokeStyle="#c69c6d";
    ctx.lineWidth=6;
    ctx.beginPath();
    ctx.moveTo(
      cueBall.x-Math.cos(angle)*(power+40),
      cueBall.y-Math.sin(angle)*(power+40)
    );
    ctx.lineTo(
      cueBall.x-Math.cos(angle)*10,
      cueBall.y-Math.sin(angle)*10
    );
    ctx.stroke();
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
