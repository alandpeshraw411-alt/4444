<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8 Ball Pool (Browser)</title>
<style>
  body { margin:0; background:#0b3d2e; display:flex; justify-content:center; align-items:center; height:100vh; }
  canvas { background:#1e7a5b; border:10px solid #5b3a1e; border-radius:10px; }
</style>
</head>
<body>
<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const FRICTION = 0.99;
const RADIUS = 10;

let balls = [];
let cueBall;
let dragging = false;
let aimX = 0, aimY = 0;
let power = 0;

// pockets
const pockets = [
  {x:0,y:0},{x:450,y:0},{x:900,y:0},
  {x:0,y:450},{x:450,y:450},{x:900,y:450}
];

// create balls
function initBalls(){
  balls = [];
  cueBall = {x:200,y:225,vx:0,vy:0,color:"white",alive:true};
  balls.push(cueBall);

  // triangle rack
  let startX = 600, startY = 225;
  let count = 1;
  for(let row=0; row<5; row++){
    for(let i=0;i<=row;i++){
      balls.push({
        x: startX + row*22,
        y: startY - row*11 + i*22,
        vx:0,vy:0,
        color:"orange",
        alive:true
      });
    }
  }
}
initBalls();

// mouse
canvas.addEventListener("mousedown", e=>{
  if(!allStopped()) return;
  dragging = true;
  aimX = e.offsetX;
  aimY = e.offsetY;
});
canvas.addEventListener("mousemove", e=>{
  if(dragging){
    aimX = e.offsetX;
    aimY = e.offsetY;
    let dx = cueBall.x - aimX;
    let dy = cueBall.y - aimY;
    power = Math.min(Math.sqrt(dx*dx+dy*dy),120);
  }
});
canvas.addEventListener("mouseup", e=>{
  if(dragging){
    let dx = cueBall.x - aimX;
    let dy = cueBall.y - aimY;
    let angle = Math.atan2(dy,dx);

    cueBall.vx = Math.cos(angle)*power*0.15;
    cueBall.vy = Math.sin(angle)*power*0.15;

    dragging=false;
    power=0;
  }
});

function allStopped(){
  return balls.every(b=>Math.abs(b.vx)<0.1 && Math.abs(b.vy)<0.1);
}

// physics
function update(){
  balls.forEach(b=>{
    if(!b.alive) return;

    b.x += b.vx;
    b.y += b.vy;

    b.vx *= FRICTION;
    b.vy *= FRICTION;

    // walls
    if(b.x < RADIUS || b.x > canvas.width-RADIUS) b.vx *= -1;
    if(b.y < RADIUS || b.y > canvas.height-RADIUS) b.vy *= -1;

    // pockets
    pockets.forEach(p=>{
      let dx=b.x-p.x, dy=b.y-p.y;
      if(Math.sqrt(dx*dx+dy*dy)<20){
        if(b===cueBall){
          // reset cue ball
          b.x=200; b.y=225; b.vx=0; b.vy=0;
        } else {
          b.alive=false;
        }
      }
    });
  });

  // collisions
  for(let i=0;i<balls.length;i++){
    for(let j=i+1;j<balls.length;j++){
      let b1=balls[i], b2=balls[j];
      if(!b1.alive || !b2.alive) continue;

      let dx=b2.x-b1.x, dy=b2.y-b1.y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<2*RADIUS){
        let angle=Math.atan2(dy,dx);

        let vx1=b1.vx, vy1=b1.vy;
        b1.vx=b2.vx; b1.vy=b2.vy;
        b2.vx=vx1; b2.vy=vy1;

        // separate balls
        let overlap=2*RADIUS-dist;
        b1.x -= Math.cos(angle)*overlap/2;
        b1.y -= Math.sin(angle)*overlap/2;
        b2.x += Math.cos(angle)*overlap/2;
        b2.y += Math.sin(angle)*overlap/2;
      }
    }
  }
}

// draw
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // pockets
  ctx.fillStyle="black";
  pockets.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,20,0,Math.PI*2);
    ctx.fill();
  });

  // balls
  balls.forEach(b=>{
    if(!b.alive) return;
    ctx.fillStyle=b.color;
    ctx.beginPath();
    ctx.arc(b.x,b.y,RADIUS,0,Math.PI*2);
    ctx.fill();
  });

  // aim line
  if(dragging){
    ctx.strokeStyle="white";
    ctx.beginPath();
    ctx.moveTo(cueBall.x,cueBall.y);
    ctx.lineTo(aimX,aimY);
    ctx.stroke();
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
