<!DOCTYPE html>
<html>
<head>
  <title>NovaTech AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .navbar {
      background: black;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .hero {
      text-align: center;
      padding: 50px;
    }

    /* Chat button */
    .chat-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #00c6ff;
      color: black;
      padding: 15px;
      border-radius: 50%;
      cursor: pointer;
    }

    /* Chat box */
    .chat-box {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 300px;
      background: white;
      color: black;
      border-radius: 10px;
      display: none;
      flex-direction: column;
    }

    .chat-header {
      background: #0072ff;
      color: white;
      padding: 10px;
    }

    .chat-messages {
      height: 200px;
      overflow-y: auto;
      padding: 10px;
    }

    .chat-input {
      display: flex;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
    }

    .chat-input button {
      padding: 10px;
      border: none;
      background: #0072ff;
      color: white;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div><b>NovaTech AI</b></div>
  </div>

  <div class="hero">
    <h1>Welcome to NovaTech AI</h1>
    <p>Chat with our AI assistant</p>
  </div>

  <!-- Chat Button -->
  <div class="chat-btn" onclick="toggleChat()">💬</div>

  <!-- Chat Box -->
  <div class="chat-box" id="chatBox">
    <div class="chat-header">AI Chatbot</div>
    <div class="chat-messages" id="messages"></div>

    <div class="chat-input">
      <input id="userInput" placeholder="Type a message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    function toggleChat() {
      let box = document.getElementById("chatBox");
      box.style.display = box.style.display === "flex" ? "none" : "flex";
    }

    function sendMessage() {
      let input = document.getElementById("userInput");
      let messages = document.getElementById("messages");

      let userText = input.value;
      if (userText === "") return;

      messages.innerHTML += "<p><b>You:</b> " + userText + "</p>";

      let reply = getAIResponse(userText);
      messages.innerHTML += "<p><b>AI:</b> " + reply + "</p>";

      input.value = "";
      messages.scrollTop = messages.scrollHeight;
    }

    function getAIResponse(input) {
      input = input.toLowerCase();

      if (input.includes("hello")) return "Hello! How can I help you?";
      if (input.includes("ai")) return "AI is the future of technology!";
      if (input.includes("website")) return "We build modern websites.";
      if (input.includes("price")) return "Contact us for pricing.";
      
      return "I'm still learning. Ask me something else!";
    }
  </script>

</body>
</html>
