<!DOCTYPE html>
<html>
<head>
  <title>NovaTech</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    /* Navbar */
    .navbar {
      background: black;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .navbar a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
    }

    /* Hero Section with Image */
    .hero {
      background: url('https://images.unsplash.com/photo-1498050108023-c5249f4df085') no-repeat center;
      background-size: cover;
      color: white;
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      background: rgba(0,0,0,0.6);
      display: inline-block;
      padding: 10px;
    }

    .hero p {
      background: rgba(0,0,0,0.6);
      display: inline-block;
      padding: 10px;
    }

    /* Services */
    .services {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      width: 250px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      background: black;
      color: white;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div><b>NovaTech</b></div>
    <div>
      <a href="#">Home</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </div>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <h1>Welcome to NovaTech</h1>
    <p>We build modern websites</p>
  </div>

  <!-- Services -->
  <div class="services">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1559027615-cd4628902d4a">
      <div class="card-content">
        <h3>Web Design</h3>
        <p>Beautiful and modern layouts</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
      <div class="card-content">
        <h3>Development</h3>
        <p>Fast and secure websites</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1521791136064-7986c2920216">
      <div class="card-content">
        <h3>Support</h3>
        <p>24/7 customer support</p>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <p>© 2026 NovaTech. All rights reserved.</p>
  </div>

</body>
</html>
